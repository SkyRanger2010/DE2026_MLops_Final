# Development values для ML Service
# Использование: helm install ml-service-release ./helm/ml-service -f values-dev.yaml

replicaCount: 1

image:
  repository: ml-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: NodePort
  port: 80
  targetPort: 8888

ingress:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

env:
  modelVersion: "1.0.0-dev"
  databaseUrl: "sqlite:///./predictions.db"

probes:
  startup:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 3
    failureThreshold: 5
    timeoutSeconds: 2

  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 5
    failureThreshold: 2
    timeoutSeconds: 2

  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 2
    timeoutSeconds: 3
